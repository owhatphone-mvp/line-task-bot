services:
  - type: web
    name: line-task-bot
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server.js
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: taskbot-db
          property: connectionString

databases:
  - name: taskbot-db
    databaseName: taskbot
    plan: free
